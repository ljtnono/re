<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>图片列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}" charset="utf-8"></script>
    <script th:src="@{/static/back/js/xadmin.js}"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a th:href="${#servletContext.contextPath} + '/admin'">首页</a>
        <a href="javascript:">图片管理</a>
        <a href="javascript:" onclick="location.reload()"><cite>图片列表</cite></a>
    </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body">
                    <form class="layui-form layui-col-space5">
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="originName" placeholder="请输入图片名" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="type" placeholder="请输入图片类型" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="owner" placeholder="请输入上传者" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <button class="layui-btn" lay-submit lay-filter="search">
                                <i class="layui-icon">&#xe615;</i></button>
                        </div>
                    </form>
                </div>
                <div class="layui-card-body">
                    <table class="layui-table" lay-filter="image"></table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script th:inline="javascript">
    layui.use(["laydate", "table", "util", "form"], function () {
        let form = layui.form;
        let table = layui.table;
        let util = layui.util;
        table.render({
            elem: '.layui-table',
            height: 450,
            id: "imageTable",
            url: [[${#servletContext.contextPath}]] + "/image/listImagePage",
            page: true,
            method: "get",
            request: {
                pageName: "page",
                limitName: "count"
            },
            parseData: function (res) {
                return {
                    "status": res.status,
                    "count": res.fields.totalCount,
                    "message": res.message,
                    "data": res.data
                };
            },
            response: {
                statusName: "status",
                statusCode: 200,
                msgName: "message",
                countName: "count",
                dataName: "data"
            },
            cols: [
                [
                    {type: 'checkbox', fixed: 'left'},
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'originName', title: '图片名', width: 130},
                    {field: 'size', title: '图片大小（字节）', width: 130},
                    {field: 'type', title: '图片类型', width: 130},
                    {field: 'url', title: '图片url', width: 130},
                    {field: 'owner', title: '上传者', width: 130},
                    {
                        field: 'createTime', title: '创建时间', width: 170,
                        templet: function (d) {
                            return util.toDateString(d.createTime, "yyyy-MM-dd HH:ss");
                        }
                    },
                    {
                        field: 'modifyTime', title: '最后修改时间', width: 170, sort: true,
                        templet: function (d) {
                            return util.toDateString(d.modifyTime, "yyyy-MM-dd HH:ss");
                        }
                    },
                    {
                        field: 'status', title: '状态', width: 80, sort: true,
                        templet: function (d) {
                            if (d.status === 1) {
                                return "正常";
                            } else if (d.status === 0) {
                                return "已删除";
                            }
                        }
                    }
                ]
            ]
        });
        // 监听表单提交事件
        form.on('submit(search)', function (data) {
            table.reload("imageTable", {
                url: [[${#servletContext.contextPath}]] + "/image/search",
                where: {
                    originName: data.field.originName,
                    type: data.field.type,
                    owner: data.field.owner
                },
                method: "POST",
                parseData: function (res) {
                    return {
                        "status": res.status,
                        "count": res.fields.totalCount,
                        "message": res.message,
                        "data": res.data
                    };
                },
                response: {
                    statusName: "status",
                    statusCode: 200,
                    msgName: "message",
                    countName: "count",
                    dataName: "data"
                }
            });
            return false;
        });
    });
</script>
</html>
