<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}" charset="utf-8"></script>
    <script th:src="@{/static/back/js/xadmin.js}"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a th:href="${#servletContext.contextPath} + '/admin'">首页</a>
        <a href="javascript:">用户管理</a>
        <a href="javascript:" onclick="location.reload()"><cite>用户列表</cite></a>
    </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body">
                    <form class="layui-form layui-col-space5">
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="username" placeholder="请输入用户名" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="tel" placeholder="请输入手机号码" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <input type="text" name="email" placeholder="请输入邮箱" autocomplete="off"
                                   class="layui-input">
                        </div>
                        <div class="layui-inline layui-show-xs-block">
                            <button class="layui-btn" lay-submit lay-filter="search">
                                <i class="layui-icon">&#xe615;</i></button>
                        </div>
                    </form>
                </div>
                <div class="layui-card-body">
                    <table class="layui-table" lay-filter="user"></table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<!-- 操作工具栏 -->
<script type="text/html" id="toolbar">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-xs layui-btn-warm" lay-event="edit">编辑</button>
        <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</button>
        <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="restore">恢复</button>
    </div>
</script>
<script th:inline="javascript">
    layui.use(["laydate", "table", "util", "form"], function () {
        let form = layui.form;
        let table = layui.table;
        let util = layui.util;
        table.render({
            elem: '.layui-table',
            height: 450,
            id: "userTable",
            url: [[${#servletContext.contextPath}]] + "/user/listUserPage",
            page: true,
            method: "get",
            toolbar: true,
            defaultToolbar: ['filter', 'print', 'exports'],
            request: {
                pageName: "page",
                limitName: "count"
            },
            parseData: function (res) {
                return {
                    "status": res.status,
                    "count": res.fields.totalCount,
                    "message": res.message,
                    "data": res.data
                };
            },
            response: {
                statusName: "status",
                statusCode: 200,
                msgName: "message",
                countName: "count",
                dataName: "data"
            },
            cols: [
                [
                    {type: 'checkbox', fixed: 'left'},
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'username', title: '用户名', width: 130},
                    {field: 'password', title: '密码', width: 130},
                    {field: 'qq', title: 'QQ', width: 130},
                    {field: 'tel', title: '电话', width: 130},
                    {field: 'email', title: '电子邮件', width: 130},
                    {
                        field: 'createTime', title: '创建时间', width: 170,
                        templet: function (d) {
                            return util.toDateString(d.createTime, "yyyy-MM-dd HH:ss");
                        }
                    },
                    {
                        field: 'modifyTime', title: '最后修改时间', width: 170, sort: true,
                        templet: function (d) {
                            return util.toDateString(d.modifyTime, "yyyy-MM-dd HH:ss");
                        }
                    },
                    {
                        field: 'status', title: '状态', width: 80, sort: true,
                        templet: function (d) {
                            if (d.status === 1) {
                                return "正常";
                            } else if (d.status === 0) {
                                return "已删除";
                            }
                        }
                    },
                    {title: "操作", fixed: 'right', width: 180, align: 'left', toolbar: '#toolbar'}
                ]
            ]
        });
        // 监听表单提交事件
        form.on('submit(search)', function (data) {
            table.reload("userTable", {
                url: [[${#servletContext.contextPath}]] + "/user/search",
                where: {
                    username: data.field.username,
                    tel: data.field.tel,
                    email: data.field.email
                },
                method: "POST",
                parseData: function (res) {
                    return {
                        "status": res.status,
                        "count": res.fields.totalCount,
                        "message": res.message,
                        "data": res.data
                    };
                },
                response: {
                    statusName: "status",
                    statusCode: 200,
                    msgName: "message",
                    countName: "count",
                    dataName: "data"
                }
            });
            return false;
        });
        // 监听操作栏点击事件
        table.on('tool(user)', function (obj) {
            let layEvent = obj.event;
            let data = obj.data;
            if ("edit" === layEvent) {
                window.parent.xadmin.add_tab(data.username, "/re/admin/user-detail?userId=" + data.id);
            } else if ("delete" === layEvent) {
                // 首先弹出询问窗口进行确认
                if (data.status === 0) {
                    layer.msg("不能删除已经删除的项！", {icon: 2});
                } else {
                    layer.confirm('确认删除？', {
                        btn: ['确认', '取消']
                    }, function (index) {
                        $.ajax({
                            url: [[${#servletContext.contextPath}]] + "/user/" + data.id,
                            method: "DELETE",
                            success: function (res) {
                                if (res.request === "success" && res.status === 200) {
                                    layer.msg(res.message, {icon: 1});
                                } else {
                                    layer.msg(res.message + ", 错误码: " + res.status, {icon: 2});
                                }
                            },
                            error: function (res) {
                                if (res) {
                                    layer.msg(res);
                                } else {
                                    layer.msg("请求错误，请检查网络", {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            } else if ("restore" === layEvent) {
                if (data.status === 1) {
                    layer.msg("不能恢复正常的项！", {icon: 2});
                } else {
                    // 恢复博客类型相关
                    layer.confirm('确认恢复？', {
                        btn: ['确认', '取消']
                    }, function (index) {
                        $.ajax({
                            url: [[${#servletContext.contextPath}]] + "/user/restore/" + data.id,
                            method: "PUT",
                            success: function (res) {
                                if (res.request === "success" && res.status === 200) {
                                    layer.msg(res.message, {icon: 1});
                                } else {
                                    layer.msg(res.message + ", 错误码: " + res.status, {icon: 2});
                                }
                            },
                            error: function (res) {
                                if (res) {
                                    layer.msg(res);
                                } else {
                                    layer.msg("请求错误，请检查网络", {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            }
        });
    });
</script>
</html>
