<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>更新日志</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}" charset="utf-8"></script>
    <script th:src="@{/static/back/js/xadmin.js}"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<!-- nav导航 -->
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a href="javascript:">首页</a>
        <a href="javascript:">时间轴管理</a>
        <a href="javascript:"><cite>时间轴更新日志</cite></a>
    </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    更新日志
                </div>
                <div class="layui-card-body">
                    <ul class="layui-timeline">
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
    layui.use(['util'], function () {
        let util = layui.util;
        $.ajax({
            url: [[${#servletContext.contextPath}]] + "/timeline/listUpdateLogTimeline",
            method: "GET",
            success: function (res) {
                if (res.request === "success" && res.status === 200) {
                    for (let i = 0; i < res.data.length; i++) {
                        if (res.data[i].status !== 0) {
                            let item = "<li class=\"layui-timeline-item\">" +
                                "                            <i class=\"layui-icon layui-timeline-axis\">&#xe63f;</i>" +
                                "                            <div class=\"layui-timeline-content layui-text\">" +
                                "                                <h3 class=\"layui-timeline-title\">" + util.toDateString(res.data[i].pushDate, "yyyy-MM-dd") + "</h3>" +
                                "                                <p>" +
                                res.data[i].content +
                                "                                </p>" +
                                "                            </div>" +
                                "                        </li>";
                            $("ul.layui-timeline").append(item);
                        }
                    }
                } else {
                    layer.msg(res.message + ", 错误码: " + res.status, {icon: 2});
                }
            },
            error: function (res) {
                if (res) {
                    layer.msg(res);
                } else {
                    layer.msg("请求错误，请检查网络", {icon: 2});
                }
            }
        });
    });

</script>
</body>
</html>
