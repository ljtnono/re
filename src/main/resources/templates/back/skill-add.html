<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>技能新增</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}"></script>
    <script th:src="@{/static/back/js/xadmin.min.js}"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<!-- nav导航 -->
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a href="javascript:">首页</a>
        <a href="javascript:">技能管理</a>
        <a href="javascript:"><cite>技能新增</cite></a>
    </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <form class="layui-form" lay-filter="form-link">
                    <div class="layui-card-body">
                        <div class="layui-collapse">
                            <div class="layui-colla-item">
                                <h2 class="layui-colla-title">技能属性<i class="layui-icon layui-colla-icon"></i></h2>
                                <div class="layui-colla-content layui-show">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">技能名</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="name" autocomplete="off" lay-verify="name"
                                                   class="layui-input" placeholder="请输入技能名">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">所有者</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="owner" autocomplete="off" lay-verify="owner"
                                                   class="layui-input" placeholder="请输入技能所有者">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">得分</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="percent" autocomplete="off" lay-verify="required|number"
                                                   class="layui-input" placeholder="请输入得分">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-input-block" style="margin-left: 0;">
                                <button type="reset" class="layui-btn layui-btn-fluid">重置</button>
                            </div>
                            <div class="layui-input-block" style="margin-left: 0;">
                                <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="form-skill-submit">
                                    提交
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
<script th:src="@{/static/fore/js/common.js}"></script>
<script th:inline="javascript">
    layui.use(["form", "layer"], function () {
        let form = layui.form;
        let layer = layui.layer;
        // 设置表单校验
        form.verify({
            name: function (value, item) {
                let nameRex = /^[\w\W\s\u4e00-\u9fcc]{2,20}$/;
                if (!nameRex.test(value)) {
                    return "技能名只能为2-20个字符";
                }
            },
            owner: function (value, item) {
                let ownerRex = /^[\w\W\s\u4e00-\u9fcc]{2,20}$/;
                if (!ownerRex.test(value)) {
                    return "技能所有者只能为2-20个字符";
                }
            }
        });
        // 监听提交事件
        form.on('submit(form-skill-submit)', function (data) {
            let skill = data.field;
            layer.confirm('确认提交？', {
                btn: ['确认', '取消']
            }, function (index) {
                $.ajax({
                    url: "/skill",
                    data: {
                        name: skill.name,
                        owner: skill.owner,
                        percent: skill.percent
                    },
                    method: "POST",
                    dateType: "json",
                    success: function (res) {
                        if (res.request === "success" && res.status === 200) {
                            layer.msg(res.message , {icon: 1});
                        } else {
                            layer.msg(res.message + ", 错误码: " + res.status , {icon: 2});
                        }
                    },
                    error: function (res) {
                        if (res) {
                            layer.msg(res);
                        } else {
                            layer.msg("请求错误，请检查网络", {icon: 2});
                        }
                    }
                });
                layer.close(index);
            });
            return false;
        });
    });
</script>
</html>
