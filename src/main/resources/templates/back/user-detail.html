<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户详情</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}"></script>
    <script th:src="@{/static/back/js/xadmin.min.js}"></script>
    <script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<!-- nav导航 -->
<div class="x-nav">
    <span class="layui-breadcrumb">
        <a href="javascript:">首页</a>
        <a href="javascript:">用户管理</a>
        <a href="javascript:"><cite>用户详情</cite></a>
    </span>
    <a class="layui-btn layui-btn-small" style="line-height:1.6em;margin-top:3px;float:right"
       onclick="location.reload()" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <form class="layui-form" lay-filter="form-user">
                    <div class="layui-card-body">
                        <div class="layui-collapse">
                            <div class="layui-colla-item">
                                <h2 class="layui-colla-title">用户属性<i class="layui-icon layui-colla-icon"></i></h2>
                                <div class="layui-colla-content layui-show">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">用户Id</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="id" autocomplete="off"
                                                   class="layui-input" disabled>
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">用户名</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="username" autocomplete="off" lay-verify="username"
                                                   class="layui-input" placeholder="请输入用户名">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">密码</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="password" autocomplete="off"
                                                   class="layui-input" placeholder="请输入密码" lay-verify="password">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">QQ</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="qq" autocomplete="off"
                                                   class="layui-input" placeholder="请输入qq">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">手机号码</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="tel" autocomplete="off"
                                                   class="layui-input" placeholder="请输入手机号码">
                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">邮箱</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="email" autocomplete="off"
                                                   class="layui-input" placeholder="请输入邮箱">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-card-body">
                        <div class="layui-form-item">
                            <div class="layui-input-block" style="margin-left: 0;">
                                <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="form-user-submit">提交
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
<script th:src="@{/static/fore/js/common.js}"></script>
<script th:inline="javascript">
    let userId = [[${#request.getParameter("userId")}]];
    console.log("正在编辑博客类型，userId = " + userId);
    let user;
    layui.use(['form', 'layer', 'util'], function () {
        let form = layui.form;
        let layer = layui.layer;
        if (userId) {
            // 获取timeline相关信息
            $.ajax({
                url: "/user/" + userId,
                method: "GET",
                success: function (res) {
                    if (res.request === "success" && res.status === 200 && res.data) {
                        user = res.data[0];
                        form.val("form-user", {
                            "id": user.id,
                            "username": user.username,
                            "password": user.password,
                            "qq": user.qq,
                            "tel": user.tel,
                            "email": user.email
                        });
                        form.render();
                    } else {
                        layer.msg(res.message + ", 错误码: " + res.status , {icon: 2});
                    }
                },
                error: function (res) {
                    if (res) {
                        layer.msg(res);
                    } else {
                        layer.msg("请求错误，请检查网络", {icon: 2});
                    }
                }
            });
            // 监听提交事件
            form.on('submit(form-user-submit)', function (data) {
                let user = data.field;
                layer.confirm('确认提交？', {
                    btn: ['确认', '取消']
                }, function (index) {
                    $.ajax({
                        url: "/user/" + userId,
                        data: {
                            "id": user.id,
                            "username": user.username,
                            "password": user.password,
                            "qq": user.qq,
                            "tel": user.tel,
                            "email": user.email
                        },
                        method: "PUT",
                        dateType: "json",
                        success: function (res) {
                            if (res.request === "success" && res.status === 200) {
                                layer.msg(res.message , {icon: 1});
                            } else {
                                layer.msg(res.message + ", 错误码: " + res.status , {icon: 2});
                            }
                        },
                        error: function (res) {
                            if (res) {
                                layer.msg(res);
                            } else {
                                layer.msg("请求错误，请检查网络", {icon: 2});
                            }
                        }
                    });
                    layer.close(index);
                });
                return false;
            });
            // 设置表单校验
            form.verify({
                username: function (value, item) {
                    let usernameRex = /^[\w\W\s\u4e00-\u9fcc]{2,20}$/;
                    if (!usernameRex.test(value)) {
                        return "用户名只能为2-20个字符";
                    }
                },
                password: function (value, item) {
                    let passwordRex = /^[\w\W\s\u4e00-\u9fcc]{6,32}$/;
                    if (!passwordRex.test(value)) {
                        return "内容只能为6-32个字符";
                    }
                }
            });
        } else {
            layer.msg("参数错误", {icon: 2});
        }
    });
</script>
</html>
