<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Root Element</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi"/>
    <link rel="stylesheet" th:href="@{/static/back/css/font.css}">
    <link rel="stylesheet" th:href="@{/static/back/css/xadmin.css}">
    <script th:src="@{/static/back/lib/layui/layui.js}" charset="utf-8"></script>
    <script th:src="@{/static/back/js/xadmin.js}"></script>
    <!-- 让IE8/9支持媒体查询，从而兼容栅格 -->
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-body ">
                    <blockquote class="layui-elem-quote">
                        欢迎管理员：
                        <span class="x-red" th:text="${session.SPRING_SECURITY_CONTEXT.authentication.principal.username}">admin</span>
                        ！当前时间:
                        <span th:text="${#dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm')}" id="now"></span>
                    </blockquote>
                </div>
            </div>
        </div>
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">数据统计</div>
                <div class="layui-card-body ">
                    <ul class="layui-row layui-col-space10 layui-this x-admin-carousel x-admin-backlog">
                        <li class="layui-col-md2 layui-col-xs6">
                            <a href="javascript:" class="x-admin-backlog-body">
                                <h3>文章数</h3>
                                <p>
                                    <cite th:text="${application.blogTotalCount}">66</cite></p>
                            </a>
                        </li>
                        <li class="layui-col-md2 layui-col-xs6">
                            <a href="javascript:" class="x-admin-backlog-body">
                                <h3>回复数</h3>
                                <p>
                                    <cite th:text="${application.blogCommentTotalCount}">99</cite></p>
                            </a>
                        </li>
                        <li class="layui-col-md2 layui-col-xs6">
                            <a href="javascript:;" class="x-admin-backlog-body">
                                <h3>浏览数</h3>
                                <p>
                                    <cite th:text="${application.blogViewTotalCount}">1880</cite></p>
                            </a>
                        </li>
                        <li class="layui-col-md2 layui-col-xs6">
                            <a href="javascript:" class="x-admin-backlog-body">
                                <h3>分类数</h3>
                                <p>
                                    <cite th:text="${application.blogTypeTotalCount}">67</cite></p>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">系统信息</div>
                <div class="layui-card-body ">
                    <table class="layui-table">
                        <tbody>
                        <tr>
                            <th>系统版本</th>
                            <td th:text="${application.sys_version}"></td>
                        </tr>
                        <tr>
                            <th>服务器地址</th>
                            <td th:text="${application.server_ip}"></td>
                        </tr>
                        <tr>
                            <th>操作系统</th>
                            <td th:text="${application.os_name}"></td>
                        </tr>
                        <tr>
                            <th>servlet容器</th>
                            <td th:text="${application.servlet_container}"></td>
                        </tr>
                        <tr>
                            <th>负载均衡</th>
                            <td th:text="${application.servlet_jhfz}"></td>
                        </tr>
                        <tr>
                            <th>JDK版本</th>
                            <td th:text="${application.java_version}"></td>
                        </tr>
                        <tr>
                            <th>MYSQL版本</th>
                            <td th:text="${application.mysql_version}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">开发团队</div>
                <div class="layui-card-body ">
                    <table class="layui-table">
                        <tbody>
                        <tr>
                            <th>版权所有</th>
                            <td>凌家童
                                <a href="http://www.ljtnono.cn/re" target="_blank">访问博客前台</a></td>
                        </tr>
                        <tr>
                            <th>开发者</th>
                            <td>凌家童(935188400@qq.com)</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <style id="welcome_style"></style>
        <div class="layui-col-md12">
            <blockquote class="layui-elem-quote layui-quote-nm">
                感谢layui,百度Echarts,jquery,本系统由x-admin提供技术支持。
            </blockquote>
        </div>
    </div>
</div>
</div>
<script src="https://cdn.bootcss.com/jquery/1.11.0/jquery.min.js"></script>
<script th:inline="javascript">
    // 设置当前时间每秒更新
    layui.use("date", function () {

    });
</script>
</body>
</html>
